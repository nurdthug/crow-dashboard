name: crow-scout-daily
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run scout
        run: |
          python scout.py --outdir .
          python research.py
      - name: Validate outputs
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path

          required = ["opportunities.json", "research.json", "digest.md", "research.md"]
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit(f"missing output files: {', '.join(missing)}")

          opps = json.loads(Path("opportunities.json").read_text())
          research = json.loads(Path("research.json").read_text())
          if not isinstance(opps, list):
              raise SystemExit("opportunities.json must be a list")
          recs = research.get("recommendations")
          if not isinstance(recs, list) or not recs:
              raise SystemExit("research.json must contain at least one recommendation")
          expected = [
              "rank", "title", "url", "value_usd", "why", "next_step",
              "effort", "days_left", "competition", "deadline",
          ]
          for i, rec in enumerate(recs, 1):
              missing_keys = [key for key in expected if key not in rec]
              if missing_keys:
                  raise SystemExit(f"recommendation {i} missing {', '.join(missing_keys)}")
              if not rec.get("title") or not rec.get("url"):
                  raise SystemExit(f"recommendation {i} missing title/url value")
              float(rec.get("value_usd") or 0)
          print(f"validated {len(opps)} opportunities and {len(recs)} recommendations")
          EOF
      - name: Commit results
        run: |
          git config user.name "crow-scout[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add digest.md opportunities.json research.md research.json .scout_seen.json
          git diff --cached --quiet || git commit -m "Daily sweep $(date -u +%F)"
          git push
      - name: Push notification (ntfy.sh)
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import json, urllib.request
          opps = json.load(open("opportunities.json"))
          research = json.load(open("research.json"))
          picks = []
          for o in research.get("recommendations", [])[:3]:
              val = f"${float(o.get('value_usd') or 0):,.0f} {o.get('token') or 'USD'}"
              picks.append(f"{o.get('rank')}. {o.get('title')} — {val} ({o.get('why')})")
          avoid = research.get("avoid_first", [])[:1]
          skip = f"\nSkip first: {avoid[0].get('title')} ({avoid[0].get('competition'):,} competitors)" if avoid else ""
          agent = sum(1 for o in opps if o.get("agent_access") == "AGENT_ALLOWED")
          body = "\n".join(picks) + skip + f"\n{len(opps)} open, {agent} agent-eligible - nurdthug.github.io/crow-dashboard"
          req = urllib.request.Request("https://ntfy.sh/crow-nest-nurdthug-x7k2",
              data=body.encode(), headers={"Title": "Crow Research: top 3 next moves", "Tags": "bird"})
          urllib.request.urlopen(req, timeout=15)
          EOF
      - name: Telegram daily brief
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.parse, urllib.request
          tok = os.environ.get("TG_TOKEN")
          if not tok:
              print("TELEGRAM_BOT_TOKEN secret not set; skipping")
              raise SystemExit(0)
          opps = json.load(open("opportunities.json"))
          research = json.load(open("research.json"))
          picks = []
          for o in research.get("recommendations", [])[:3]:
              val = f"${float(o.get('value_usd') or 0):,.0f} {o.get('token') or 'USD'}"
              picks.append(f"{o.get('rank')}. {o.get('title')} — {val}\n{o.get('url') or ''}")
          avoid = research.get("avoid_first", [])[:1]
          skip = f"\n\nSkip first: {avoid[0].get('title')} ({avoid[0].get('competition'):,} competitors)" if avoid else ""
          text = (f"🐦‍⬛ Crow brief — {len(opps)} live opportunities. Research top picks:\n\n"
                  + "\n\n".join(picks)
                  + skip
                  + "\n\nDashboard: https://nurdthug.github.io/crow-dashboard/")
          data = urllib.parse.urlencode({
              "chat_id": "366746092",
              "text": text,
              "disable_web_page_preview": "true",
          }).encode()
          urllib.request.urlopen(f"https://api.telegram.org/bot{tok}/sendMessage", data=data, timeout=15)
          print("telegram brief sent")
          EOF
