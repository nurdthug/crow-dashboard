name: crow-scout-daily
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run scout
        run: python scout.py --outdir .
      - name: Commit results
        run: |
          git config user.name "crow-scout[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add digest.md opportunities.json .scout_seen.json
          git diff --cached --quiet || git commit -m "Daily sweep $(date -u +%F)"
          git push
