name: crow-scout-daily
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run scout
        run: |
          python scout.py --outdir .
          python research.py
          python draft.py
          python stats.py
      - name: Commit results
        run: |
          git config user.name "crow-scout[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add digest.md opportunities.json research.md .scout_seen.json drafts stats.csv
          git diff --cached --quiet || git commit -m "Daily sweep $(date -u +%F)"
          git push
      - name: Push notification (ntfy.sh)
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import json, urllib.request
          opps = json.load(open("opportunities.json"))
          fresh = [o for o in opps if o.get("is_new")] or opps
          top = sorted(fresh, key=lambda o: -o["score"])[:3]
          lines = [f"{o['title']} - ${o['value_usd']:,.0f} (EV {o['score']:,.0f})" for o in top]
          agent = sum(1 for o in opps if o.get("agent_access") == "AGENT_ALLOWED")
          body = "\n".join(lines) + f"\n{len(opps)} open, {agent} agent-eligible - nurdthug.github.io/crow-dashboard"
          req = urllib.request.Request("https://ntfy.sh/crow-nest-nurdthug-x7k2",
              data=body.encode(), headers={"Title": f"Crow Scout: {len(fresh)} new finds", "Tags": "bird"})
          urllib.request.urlopen(req, timeout=15)
          EOF
      - name: Telegram daily brief
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, re, urllib.parse, urllib.request
          tok = os.environ.get("TG_TOKEN")
          if not tok:
              print("TELEGRAM_BOT_TOKEN secret not set; skipping")
              raise SystemExit(0)
          opps = json.load(open("opportunities.json"))
          md = open("research.md").read()
          picks = []
          for l in md.splitlines():
              if not re.match(r"^\|\s*[1-3]\s*\|", l):
                  continue
              p = l.split("|")
              title = "|".join(p[3:len(p) - 4]).strip()
              m = re.match(r"\[(.*)\]\((.*?)\)", title)
              name, url = (m.group(1), m.group(2)) if m else (title, "")
              val = p[len(p) - 4].strip()
              picks.append(f"{p[1].strip()}. {name} — {val}\n{url}")
          text = (f"🐦‍⬛ Crow brief — {len(opps)} live opportunities. Research top picks:\n\n"
                  + "\n\n".join(picks)
                  + "\n\nDashboard: https://nurdthug.github.io/crow-dashboard/")
          data = urllib.parse.urlencode({
              "chat_id": "366746092",
              "text": text,
              "disable_web_page_preview": "true",
          }).encode()
          urllib.request.urlopen(f"https://api.telegram.org/bot{tok}/sendMessage", data=data, timeout=15)
          print("telegram brief sent")
          EOF
